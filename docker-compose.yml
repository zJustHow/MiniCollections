version: '3.8'

services:

  db:
    image: postgres:15.2-alpine
    environment:
      POSTGRES_DB: minicollections
      POSTGRES_PASSWORD: secret
      TZ: UTC
    volumes:
      - minicollections-pg-local:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  minicollections-pg-local: