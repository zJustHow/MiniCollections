spring:
  jackson:
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:postgresql://${DATABASE_URL:localhost}:${DATABASE_PORT:5432}/minicollections
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: ${INIT_DB:always}
      schema-locations: "classpath:database-init.sql"
      data-locations:
        - "classpath:minigt-brand-objects.sql"
        - "classpath:lcd-brand-objects.sql"
  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=60s,maximumSize=500
logging:
  level:
    root: INFO
---
# Development environment: enable SQL and request logs for debugging
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    org.apache.coyote.http11.Http11InputBuffer: TRACE
    org.springframework.jdbc.datasource.init: DEBUG
    org.springframework.jdbc.core: DEBUG